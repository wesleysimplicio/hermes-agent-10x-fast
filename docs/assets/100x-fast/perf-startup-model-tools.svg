<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">model_tools startup performance comparison</title>
  <desc id="desc">Bar chart comparing main versus branch median import_model_tools startup time.</desc>
  <rect width="1200" height="675" fill="#101820"/>
  <text x="60" y="78" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Startup: import model_tools</text>
  <text x="60" y="116" fill="#b8c4d5" font-family="Arial, sans-serif" font-size="18">Cold subprocess median, baseline main versus optimized branch.</text>
  <text x="90" y="218" fill="#fca5a5" font-family="Arial, sans-serif" font-size="24" font-weight="700">main</text>
  <rect x="240" y="185" width="680" height="58" rx="6" fill="#ef4444"/>
  <text x="945" y="223" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24">2.0847s</text>
  <text x="90" y="338" fill="#93c5fd" font-family="Arial, sans-serif" font-size="24" font-weight="700">branch</text>
  <rect x="240" y="305" width="275" height="58" rx="6" fill="#3b82f6"/>
  <text x="540" y="343" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24">0.8419s</text>
  <rect x="90" y="445" width="1015" height="100" rx="10" fill="#1f2937" stroke="#60a5fa" stroke-width="2"/>
  <text x="120" y="485" fill="#dbeafe" font-family="Arial, sans-serif" font-size="24" font-weight="700">Measured speedup: 2.48x</text>
  <text x="120" y="520" fill="#b8c4d5" font-family="Arial, sans-serif" font-size="18">Primary reason: platform plugin imports are deferred from the normal model_tools path.</text>
</svg>
