<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Delegate task config snapshot and parallel guard fast path</title>
  <desc id="desc">Before and after comparison for delegate_task config reuse and read_file parallel guard optimization.</desc>
  <rect width="1280" height="720" fill="#0f1419"/>
  <text x="64" y="72" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="800">Runtime Use: Delegate + Parallel Guard</text>
  <text x="64" y="112" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">Less serial setup before subagents run; cheaper safety checks before parallel read batches.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(64,154)">
      <rect width="540" height="420" rx="18" fill="#18212b"/>
      <text x="30" y="52" fill="#fca5a5" font-size="26" font-weight="800">Before</text>
      <text x="30" y="92" fill="#e2e8f0" font-size="18">delegate_task re-entered config helpers</text>
      <text x="30" y="124" fill="#e2e8f0" font-size="18">children resolved timeout/approval again</text>
      <text x="30" y="156" fill="#e2e8f0" font-size="18">parallel guard rebuilt path objects every check</text>
      <text x="30" y="188" fill="#e2e8f0" font-size="18">concurrent executor parsed tool JSON again</text>

      <rect x="30" y="230" width="448" height="30" rx="15" fill="#7f1d1d"/>
      <rect x="30" y="286" width="420" height="30" rx="15" fill="#9a3412"/>
      <rect x="30" y="342" width="360" height="30" rx="15" fill="#854d0e"/>
      <text x="30" y="218" fill="#94a3b8" font-size="15">parallel_guard_read_files</text>
      <text x="492" y="253" fill="#fee2e2" font-size="18" font-weight="800">6.9878s</text>
      <text x="30" y="274" fill="#94a3b8" font-size="15">per 8-tool guard decision</text>
      <text x="464" y="309" fill="#ffedd5" font-size="18" font-weight="800">0.7465ms</text>
      <text x="30" y="330" fill="#94a3b8" font-size="15">delegate config loads</text>
      <text x="404" y="365" fill="#fef3c7" font-size="18" font-weight="800">per helper/child</text>
    </g>

    <g transform="translate(676,154)">
      <rect width="540" height="420" rx="18" fill="#16241f"/>
      <text x="30" y="52" fill="#86efac" font-size="26" font-weight="800">After</text>
      <text x="30" y="92" fill="#e2e8f0" font-size="18">one delegation config snapshot per call</text>
      <text x="30" y="124" fill="#e2e8f0" font-size="18">precomputed timeout, approval, reasoning</text>
      <text x="30" y="156" fill="#e2e8f0" font-size="18">read_file guard uses exact normalized paths</text>
      <text x="30" y="188" fill="#e2e8f0" font-size="18">parsed args ride into concurrent execution</text>

      <rect x="30" y="230" width="105" height="30" rx="15" fill="#22c55e"/>
      <rect x="30" y="286" width="94" height="30" rx="15" fill="#38bdf8"/>
      <rect x="30" y="342" width="76" height="30" rx="15" fill="#a78bfa"/>
      <text x="30" y="218" fill="#94a3b8" font-size="15">parallel_guard_read_files</text>
      <text x="150" y="253" fill="#dcfce7" font-size="18" font-weight="800">1.6403s</text>
      <text x="30" y="274" fill="#94a3b8" font-size="15">per 8-tool guard decision</text>
      <text x="140" y="309" fill="#e0f2fe" font-size="18" font-weight="800">0.1673ms</text>
      <text x="30" y="330" fill="#94a3b8" font-size="15">delegate config loads</text>
      <text x="122" y="365" fill="#ede9fe" font-size="18" font-weight="800">1</text>
    </g>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="214" y="604" width="852" height="54" rx="27" fill="#111827" stroke="#334155"/>
    <text x="252" y="638" fill="#f8fafc" font-size="21" font-weight="800">Measured guard improvement: 4.26x lower median, 0.7465ms -> 0.1673ms per 8-tool decision</text>
  </g>
</svg>
