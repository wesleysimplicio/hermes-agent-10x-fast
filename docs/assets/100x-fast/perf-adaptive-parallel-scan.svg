<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">adaptive parallel scan performance comparison</title>
  <desc id="desc">Bar chart showing that the current tool source directory is below the threshold where parallel scanning helps.</desc>
  <rect width="1200" height="675" fill="#101820"/>
  <text x="60" y="78" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Tool source scan: adaptive parallelism</text>
  <text x="60" y="116" fill="#b8c4d5" font-family="Arial, sans-serif" font-size="18">The branch supports parallel scanning, but benchmark data keeps it disabled for the current small tools directory.</text>
  <text x="90" y="218" fill="#93c5fd" font-family="Arial, sans-serif" font-size="24" font-weight="700">sequential</text>
  <rect x="240" y="185" width="618" height="58" rx="6" fill="#3b82f6"/>
  <text x="885" y="223" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24">0.0982s</text>
  <text x="90" y="338" fill="#fca5a5" font-family="Arial, sans-serif" font-size="24" font-weight="700">adaptive</text>
  <rect x="240" y="305" width="680" height="58" rx="6" fill="#64748b"/>
  <text x="945" y="343" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24">0.1079s</text>
  <rect x="90" y="445" width="1015" height="100" rx="10" fill="#1f2937" stroke="#94a3b8" stroke-width="2"/>
  <text x="120" y="485" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="24" font-weight="700">Decision: parallel_eligible=False for current repo</text>
  <text x="120" y="520" fill="#b8c4d5" font-family="Arial, sans-serif" font-size="18">Parallelism is available for larger future directories, while current startup keeps the faster sequential path.</text>
</svg>
