name: Benchmark Refresh After Sync

on:
  push:
    branches:
      - "codex/tota-hermes-daily-*"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and report dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all,dev,fast]"
          python -m pip install reportlab cairosvg

      - name: Refresh benchmark artifacts
        run: python scripts/refresh_sync_benchmarks.py --python python

      - name: Upload benchmark refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-refresh
          path: |
            docs/tota-benchmark-hermes-0.14.0.json
            docs/tota-benchmark-hermes-0.14.0.md
            docs/benchmark-refresh-status.json
            docs/benchmark-refresh-status.md
            docs/assets/tota-benchmark/battles
            tota_agent_benchmark_report.pdf
